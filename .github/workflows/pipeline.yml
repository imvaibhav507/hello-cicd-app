name: Build and Deploy to Sandbox

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
      - '.maven/**'
      
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
      - '.maven/**'
      
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    
    # Required to authenticate and write to GitHub Packages
    permissions:
      contents: read
      packages: write
      
    env:
      CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}
      # Passed into the environment for your settings.xml to read
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Build and Run MUnits
      run: mvn -B clean package -DskipTests -s .maven/settings.xml

    - name: Publish to GitHub Packages
      # Only publish the package on a merge/push, not on PRs
      if: github.event_name == 'push'
      run: |
        mvn deploy:deploy-file \
          -DskipTests \
          -s .maven/settings.xml \
          -Dfile=$(ls target/*.jar | head -1) \
          -DpomFile=pom.xml \
          -DrepositoryId=github \
          -Durl=https://maven.pkg.github.com/${{ github.repository }}

    - name: Stamp artifact file name with commit hash
      if: github.event_name == 'push'   # only needed for deploy flow
      run: |
        artifactName1=$(ls target/*.jar | head -1)
        commitHash=$(git rev-parse --short "$GITHUB_SHA")
        artifactName2=$(ls target/*.jar | head -1 | sed "s/.jar/-$commitHash.jar/g")
        mv $artifactName1 $artifactName2

    - name: Upload artifact
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: artifacts
        path: target/*.jar


  upload:
    needs: build
    if: github.event_name == 'push'   # ONLY after merge
    runs-on: ubuntu-latest
    env:
      CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - uses: actions/download-artifact@v4
      with:
        name: artifacts

    - name: Upload to Exchange
      run: |
        artifactName=$(ls *.jar | head -1)
        mvn deploy \
         -s .maven/settings.xml \
         -Dmule.artifact=$artifactName \
         -DskipTests


  deploy:
    needs: upload
    if: github.event_name == 'push'   # ONLY after merge
    runs-on: ubuntu-latest
    env:
      CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - uses: actions/download-artifact@v4
      with:
        name: artifacts

    - name: Deploy to Sandbox
      run: |
        artifactName=$(ls *.jar | head -1)
        mvn deploy -DmuleDeploy \
         -Dmule.artifact=$artifactName \
         -s .maven/settings.xml \
         -DskipTests \
         -DskipDeploymentVerification="true"